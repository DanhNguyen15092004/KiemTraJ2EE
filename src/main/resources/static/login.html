<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Course Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%); min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .card-header { background: linear-gradient(135deg, #1565c0, #1976d2); border-radius: 16px 16px 0 0 !important; }
    .btn-primary { background: linear-gradient(135deg, #1565c0, #1976d2); border: none; }
    .btn-primary:hover { background: linear-gradient(135deg, #0d47a1, #1565c0); }
    .form-control:focus { border-color: #1976d2; box-shadow: 0 0 0 0.2rem rgba(25,118,210,.25); }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card">
          <div class="card-header text-white text-center py-4">
            <i class="bi bi-mortarboard-fill fs-1 mb-2 d-block"></i>
            <h4 class="mb-0 fw-bold">Course Registration</h4>
            <small class="opacity-75">Đăng nhập vào hệ thống</small>
          </div>
          <div class="card-body p-4">
            <div id="alertBox" class="alert d-none" role="alert"></div>
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" id="username" class="form-control" placeholder="Nhập username" required />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" id="password" class="form-control" placeholder="Nhập password" required />
                  <button type="button" class="btn btn-outline-secondary" id="togglePwd">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
              </button>
            </form>
            <hr />
            <p class="text-center mb-0 text-muted">
              Chưa có tài khoản?
              <a href="register.html" class="text-decoration-none fw-semibold">Đăng ký ngay</a>
            </p>
          </div>
        </div>
        <p class="text-center text-white mt-3 opacity-75 small">
          Demo: admin/admin123 hoặc nguyenvan/student123
        </p>
      </div>
    </div>
  </div>

  <script>
    // Nếu đã đăng nhập thì redirect
    (async () => {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) {
          const data = await res.json();
          const roles = data.data?.roles || [];
          if (roles.includes('ADMIN')) window.location.href = 'admin.html';
          else window.location.href = 'index.html';
        }
      } catch (e) {}
    })();

    // Toggle password
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const alertBox = document.getElementById('alertBox');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showAlert('Vui lòng nhập đầy đủ thông tin.', 'danger');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          const roles = data.data?.roles || [];
          showAlert('Đăng nhập thành công! Đang chuyển trang...', 'success');
          setTimeout(() => {
            if (roles.includes('ADMIN')) window.location.href = 'admin.html';
            else window.location.href = 'index.html';
          }, 800);
        } else {
          showAlert(data.message || 'Sai username hoặc password.', 'danger');
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
        }
      } catch (err) {
        showAlert('Lỗi kết nối server.', 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
      }
    });

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.className = `alert alert-${type}`;
      box.textContent = msg;
    }
  </script>
</body>
</html>

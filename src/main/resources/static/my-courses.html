<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Học phần của tôi - Course Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root { --primary: #1565c0; }
    body { background: #f0f4f8; min-height: 100vh; }
    .navbar { background: linear-gradient(135deg, var(--primary), #1976d2) !important; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    .navbar-brand { font-weight: 700; }
    .hero { background: linear-gradient(135deg, #2e7d32, #43a047); color: white; padding: 40px 0 30px; }
    .course-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform .2s, box-shadow .2s; height: 100%; }
    .course-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
    .course-img { height: 150px; object-fit: cover; border-radius: 12px 12px 0 0; }
    .course-img-placeholder { height: 150px; border-radius: 12px 12px 0 0; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); display: flex; align-items: center; justify-content: center; color: #2e7d32; font-size: 2.5rem; }
    .credits-badge { background: #e8f5e9; color: #2e7d32; font-weight: 600; border-radius: 20px; padding: 3px 10px; font-size: .8rem; }
    .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.2); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
    .skeleton { background: linear-gradient(90deg, #e0e0e0 25%, #f5f5f5 50%, #e0e0e0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .date-badge { font-size: .75rem; color: #888; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-mortarboard-fill me-2"></i>CourseReg</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Trang chủ</a></li>
        <li class="nav-item"><a class="nav-link active" href="my-courses.html"><i class="bi bi-journal-check me-1"></i>Học phần của tôi</a></li>
        <li class="nav-item dropdown" id="userDropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
            <span class="user-avatar" id="avatarText">S</span>
            <span id="navUsername">Sinh viên</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item-text text-muted small" id="navEmail"></span></li>
            <li><hr class="dropdown-divider" /></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="container text-center">
    <h2 class="fw-bold mb-2"><i class="bi bi-journal-check me-2"></i>Học phần của tôi</h2>
    <p class="opacity-75 mb-0">Danh sách các học phần bạn đã đăng ký</p>
  </div>
</div>

<div class="container py-4">
  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card card p-3 text-center">
        <div class="text-primary fw-bold fs-2" id="totalCount">-</div>
        <div class="text-muted small">Học phần</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card card p-3 text-center">
        <div class="text-success fw-bold fs-2" id="totalCredits">-</div>
        <div class="text-muted small">Tổng tín chỉ</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card card p-3 text-center">
        <div class="text-warning fw-bold fs-2" id="categoryCount">-</div>
        <div class="text-muted small">Danh mục</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card card p-3 text-center">
        <div class="text-info fw-bold fs-2" id="latestDate">-</div>
        <div class="text-muted small">Lần đăng ký gần nhất</div>
      </div>
    </div>
  </div>

  <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

  <!-- Filter -->
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0 fw-semibold">Danh sách học phần</h5>
    <input type="text" id="filterInput" class="form-control form-control-sm" style="max-width:240px" placeholder="Lọc theo tên..." oninput="filterCourses()" />
  </div>

  <!-- Course grid -->
  <div class="row g-4" id="courseList">
    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
      <div class="card course-card"><div class="skeleton" style="height:150px"></div><div class="card-body"><div class="skeleton mb-2" style="height:20px"></div><div class="skeleton" style="height:16px;width:60%"></div></div></div>
    </div>
    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
      <div class="card course-card"><div class="skeleton" style="height:150px"></div><div class="card-body"><div class="skeleton mb-2" style="height:20px"></div><div class="skeleton" style="height:16px;width:60%"></div></div></div>
    </div>
  </div>

  <!-- Empty -->
  <div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-journal-x text-muted" style="font-size:3.5rem"></i>
    <h5 class="mt-3 text-muted">Bạn chưa đăng ký học phần nào</h5>
    <a href="index.html" class="btn btn-primary mt-2"><i class="bi bi-search me-2"></i>Khám phá học phần</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let allEnrollments = [];

  async function init() {
    // Check auth
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (!res.ok) { window.location.href = 'login.html'; return; }
      const data = await res.json();
      const user = data.data;
      const roles = user.roles || [];
      if (!roles.includes('STUDENT')) { window.location.href = 'index.html'; return; }
      document.getElementById('navUsername').textContent = user.username;
      document.getElementById('navEmail').textContent = user.email || '';
      document.getElementById('avatarText').textContent = user.username[0].toUpperCase();
    } catch (e) { window.location.href = 'login.html'; return; }

    loadMyCourses();
  }

  async function loadMyCourses() {
    try {
      const res = await fetch('/api/my-courses', { credentials: 'include' });
      if (!res.ok) throw new Error();
      const data = await res.json();
      allEnrollments = data.data || [];
      renderStats(allEnrollments);
      renderCourses(allEnrollments);
    } catch (e) {
      document.getElementById('courseList').innerHTML = '<div class="col-12 text-danger">Lỗi tải dữ liệu.</div>';
    }
  }

  function renderStats(enrollments) {
    document.getElementById('totalCount').textContent = enrollments.length;
    const credits = enrollments.reduce((s, e) => s + (e.courseCredits || 0), 0);
    document.getElementById('totalCredits').textContent = credits;
    const cats = new Set(enrollments.map(e => e.categoryName).filter(Boolean));
    document.getElementById('categoryCount').textContent = cats.size;
    if (enrollments.length) {
      const dates = enrollments.map(e => e.enrollDate).filter(Boolean).sort().reverse();
      const d = dates[0] ? new Date(dates[0]) : null;
      document.getElementById('latestDate').textContent = d ? `${d.getDate()}/${d.getMonth()+1}` : '-';
    } else {
      document.getElementById('latestDate').textContent = '-';
    }
  }

  function renderCourses(enrollments) {
    const list = document.getElementById('courseList');
    const empty = document.getElementById('emptyState');

    if (!enrollments.length) {
      list.innerHTML = '';
      empty.classList.remove('d-none');
      return;
    }
    empty.classList.add('d-none');

    list.innerHTML = enrollments.map(e => {
      const imgHtml = e.courseImage
        ? `<img src="/images/${e.courseImage}" class="card-img-top course-img" alt="${escHtml(e.courseName)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="course-img-placeholder" style="display:none"><i class="bi bi-book"></i></div>`
        : `<div class="course-img-placeholder"><i class="bi bi-book"></i></div>`;

      const date = e.enrollDate ? new Date(e.enrollDate).toLocaleDateString('vi-VN') : '';

      return `
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3" data-name="${escHtml(e.courseName.toLowerCase())}">
          <div class="card course-card">
            ${imgHtml}
            <div class="card-body d-flex flex-column">
              ${e.categoryName ? `<span class="badge bg-success bg-opacity-10 text-success mb-2" style="font-size:.75rem">${escHtml(e.categoryName)}</span>` : ''}
              <h6 class="card-title fw-bold mb-2 flex-grow-1">${escHtml(e.courseName)}</h6>
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="credits-badge"><i class="bi bi-star-fill me-1"></i>${e.courseCredits} tín chỉ</span>
              </div>
              <p class="text-muted small mb-2"><i class="bi bi-person-fill me-1"></i>${escHtml(e.courseLecturer || 'Chưa cập nhật')}</p>
              ${date ? `<p class="date-badge mb-0"><i class="bi bi-calendar-check me-1"></i>Đăng ký: ${date}</p>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function filterCourses() {
    const q = document.getElementById('filterInput').value.toLowerCase();
    const filtered = q ? allEnrollments.filter(e => e.courseName.toLowerCase().includes(q)) : allEnrollments;
    renderStats(allEnrollments);
    renderCourses(filtered);
    if (!filtered.length && allEnrollments.length) {
      document.getElementById('emptyState').innerHTML = `<i class="bi bi-search text-muted" style="font-size:3rem"></i><p class="text-muted mt-3">Không tìm thấy học phần phù hợp.</p>`;
      document.getElementById('emptyState').classList.remove('d-none');
    }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = 'login.html';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
